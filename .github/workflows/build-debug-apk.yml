name: Build Debug APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JDK_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}
          cache: gradle

      - name: Read SDK versions from build config
        id: sdk
        run: |
          COMPILE_SDK=$(grep -oP '(?<=compileSdk\s=\s)\d+' app/build.gradle.kts)
          BUILD_TOOLS=$(grep -oP '(?<=buildToolsVersion\s=\s")[^"]+' app/build.gradle.kts || echo "${COMPILE_SDK}.0.0")
          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        env:
          COMPILE_SDK: ${{ steps.sdk.outputs.compile_sdk }}
          BUILD_TOOLS: ${{ steps.sdk.outputs.build_tools }}
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-${COMPILE_SDK}" "build-tools;${BUILD_TOOLS}" "platform-tools"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleStableDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OlliteRT-stable-debug-apk
          path: Android/src/app/build/outputs/apk/stable/debug/*.apk
          retention-days: 14
