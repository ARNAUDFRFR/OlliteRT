name: Build Custom APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JDK_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}
          cache: gradle

      - name: Read SDK versions from build config
        id: sdk
        run: |
          COMPILE_SDK=$(grep -oP '(?<=compileSdk\s=\s)\d+' app/build.gradle.kts)
          BUILD_TOOLS=$(grep -oP '(?<=buildToolsVersion\s=\s")[^"]+' app/build.gradle.kts || echo "${COMPILE_SDK}.0.0")
          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        env:
          COMPILE_SDK: ${{ steps.sdk.outputs.compile_sdk }}
          BUILD_TOOLS: ${{ steps.sdk.outputs.build_tools }}
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-${COMPILE_SDK}" "build-tools;${BUILD_TOOLS}" "platform-tools"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Check for signing secrets
        id: check_secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets detected. Building signed release APK."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets detected. Building default debug APK."
          fi
        working-directory: .

      - name: Decode release keystore
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
        working-directory: .

      - name: Build Signed Release APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleStableRelease --no-daemon

      - name: Build Default Debug APK
        if: steps.check_secrets.outputs.has_secrets != 'true'
        run: ./gradlew assembleStableDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OlliteRT-custom-apk
          path: |
            Android/src/app/build/outputs/apk/stable/release/*.apk
            Android/src/app/build/outputs/apk/stable/debug/*.apk
          retention-days: 14

      - name: Create automatic debug release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest Debug Build
          prerelease: true
          files: |
            Android/src/app/build/outputs/apk/stable/release/*.apk
            Android/src/app/build/outputs/apk/stable/debug/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: false
          body: |
            Automatic debug build compiled from branch `main` (commit `${{ github.sha }}`).
            
            This release is automatically updated on every successful commit. You can download the raw APK directly below.
