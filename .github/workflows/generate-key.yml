name: Generate Signing Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate JKS Keystore
        run: |
          keytool -genkeypair \
            -alias ollitert-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore ollitert-key.jks \
            -storetype JKS \
            -storepass OlliteRTSecurePassword2026! \
            -keypass OlliteRTSecurePassword2026! \
            -dname "CN=OlliteRT, O=Self, C=FR"

      - name: Convert to Base64
        id: base64
        run: |
          BASE64_STR=$(base64 -w 0 ollitert-key.jks)
          echo "$BASE64_STR" > keystore_base64.txt
          
          # Print to step summary for easy copying
          {
            echo "## Keystore Generated Successfully! 🎉"
            echo ""
            echo "Here is your Base64-encoded keystore text. Copy the entire line below and paste it as the **KEYSTORE_BASE64** secret in your GitHub repository settings:"
            echo ""
            echo "\`\`\`"
            echo "$BASE64_STR"
            echo "\`\`\`"
            echo ""
            echo "### Signing Configuration:"
            echo "- **KEY_ALIAS**: \`ollitert-key\`"
            echo "- **STORE_PASSWORD**: \`OlliteRTSecurePassword2026!\`"
            echo "- **KEY_PASSWORD**: \`OlliteRTSecurePassword2026!\`"
            echo ""
            echo "⚠️ **IMPORTANT**: Download the generated \`ollitert-key.jks\` file from the **Artifacts** section below and save it somewhere safe on your computer. You will need it if you ever want to sign builds manually in the future."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollitert-keystore
          path: ollitert-key.jks
          retention-days: 7
